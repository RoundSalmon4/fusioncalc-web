<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PokéRogue Fusion Calculator</title>
    <link rel="stylesheet" href="website/style.css">
</head>
<body>
    <div class="container">
        <h1 class="text-center">PokéRogue Fusion Calculator</h1>
        
        <div class="controls-bar">
            <label><input type="checkbox" id="flipStatChallenge"> Flip Stat Challenge</label>
            <label><input type="checkbox" id="inverseBattle"> Inverse Battle</label>
            <label><input type="checkbox" id="passiveActive"> Passive Active</label>
            <button id="displayOptionsBtn">Display Options</button>
        </div>

        <div class="main-content">
            <div class="pokemon-panel" id="panel-p1">
                <h3>Pokémon 1</h3>
                <input type="text" id="search-p1" class="search-input" placeholder="Search Pokémon...">
                <div class="pokemon-list" id="list-p1"></div>
                <div class="pokemon-details" id="details-p1"></div>
            </div>

            <div class="action-buttons">
                <button id="fuseBtn" class="btn-primary">Fuse</button>
                <button id="swapBtn" class="btn-secondary">Swap</button>
                <button id="clearBtn" class="btn-danger">Clear</button>
            </div>

            <div class="pokemon-panel" id="panel-p2">
                <h3>Pokémon 2</h3>
                <input type="text" id="search-p2" class="search-input" placeholder="Search Pokémon...">
                <div class="pokemon-list" id="list-p2"></div>
                <div class="pokemon-details" id="details-p2"></div>
            </div>
        </div>

        <div class="fusion-result" id="fusion-panel">
            <h3>Fusion Result</h3>
            <div id="fusion-details"></div>
        </div>
    </div>

    <div class="status-bar" id="status-bar">Ready.</div>

    <!-- Display Options Modal -->
    <div class="modal" id="displayOptionsModal">
        <div class="modal-content">
            <h2>Display Options</h2>
            <div class="options-grid">
                <div class="options-column">
                    <h4>Pokémon 1</h4>
                    <label><input type="checkbox" checked data-panel="p1" data-key="type"> Type</label>
                    <label><input type="checkbox" checked data-panel="p1" data-key="abilities"> Abilities</label>
                    <label><input type="checkbox" checked data-panel="p1" data-key="hidden_ability"> Hidden Ability</label>
                    <label><input type="checkbox" checked data-panel="p1" data-key="passive"> Passive</label>
                    <label><input type="checkbox" checked data-panel="p1" data-key="bst"> BST & Stats</label>
                    <label><input type="checkbox" checked data-panel="p1" data-key="total_bst"> Total BST</label>
                    <label><input type="checkbox" checked data-panel="p1" data-key="evolution"> Evolution</label>
                    <label><input type="checkbox" checked data-panel="p1" data-key="damage"> Damage Taken</label>
                </div>
                <div class="options-column">
                    <h4>Fusion</h4>
                    <label><input type="checkbox" checked data-panel="fusion" data-key="fused_type"> Fused Type</label>
                    <label><input type="checkbox" checked data-panel="fusion" data-key="abilities"> Abilities</label>
                    <label><input type="checkbox" checked data-panel="fusion" data-key="bst"> BST & Stats</label>
                    <label><input type="checkbox" checked data-panel="fusion" data-key="total_bst"> Total BST</label>
                    <label><input type="checkbox" checked data-panel="fusion" data-key="diffs"> Differences</label>
                    <label><input type="checkbox" checked data-panel="fusion" data-key="ability_effects"> Ability Effects</label>
                    <label><input type="checkbox" checked data-panel="fusion" data-key="quick_compare"> Quick Compare</label>
                    <label><input type="checkbox" checked data-panel="fusion" data-key="damage"> Damage Taken</label>
                </div>
                <div class="options-column">
                    <h4>Pokémon 2</h4>
                    <label><input type="checkbox" checked data-panel="p2" data-key="type"> Type</label>
                    <label><input type="checkbox" checked data-panel="p2" data-key="abilities"> Abilities</label>
                    <label><input type="checkbox" checked data-panel="p2" data-key="hidden_ability"> Hidden Ability</label>
                    <label><input type="checkbox" checked data-panel="p2" data-key="passive"> Passive</label>
                    <label><input type="checkbox" checked data-panel="p2" data-key="bst"> BST & Stats</label>
                    <label><input type="checkbox" checked data-panel="p2" data-key="total_bst"> Total BST</label>
                    <label><input type="checkbox" checked data-panel="p2" data-key="evolution"> Evolution</label>
                    <label><input type="checkbox" checked data-panel="p2" data-key="damage"> Damage Taken</label>
                </div>
            </div>
            <button id="closeOptionsBtn" class="btn-primary">Close</button>
        </div>
    </div>

    <script src="website/pokemon_data.js"></script>
    <script src="website/script.js"></script>
</body>
</html>
